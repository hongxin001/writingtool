<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="panel.css" />
    <title>AI Polish</title>
  </head>
  <body>
    <div id="ai-polish-root" data-theme="auto">
      <div class="header drag-handle">
        <div class="title">
          <span data-i18n="uiTitle">AI Polish</span>
          <span id="headerHint" class="header-hint"></span>
        </div>
        <div class="header-actions">
          <span id="settingsHint" class="settings-hint"></span>
          <button id="settingsBtn" class="ghost small" type="button" data-i18n="settingsButton">Settings</button>
          <button id="closeBtn" class="ghost close" type="button" aria-label="Close">x</button>
        </div>
      </div>

      <div class="content">
        <div class="section">
          <label class="label" data-i18n="selectionLabel">Selection</label>
          <div id="selectionPreview" class="selection"></div>
        </div>

        <div class="section">
          <label class="label" data-i18n="templateLabel">Template</label>
          <select id="templateSelect" class="select"></select>
        </div>

        <div class="section">
          <label class="label" data-i18n="templatePromptLabel">Template prompt</label>
          <textarea id="templatePromptInput" class="textarea" rows="3" data-i18n-placeholder="templatePromptPlaceholder"></textarea>
        </div>

        <div class="row actions-top">
          <button id="generateBtn" class="primary" type="button" data-i18n="generateButton">Generate</button>
          <div id="statusText" class="status"></div>
        </div>

        <div class="section">
          <label class="label" data-i18n="outputLabel">Result</label>
          <textarea id="outputArea" class="textarea output" rows="5" readonly></textarea>
          <button id="retryBtn" class="retry" type="button" data-i18n="retryButton">Not good enough</button>
        </div>

        <div class="row actions">
          <button id="replaceBtn" class="secondary" type="button" data-i18n="replaceButton">Replace</button>
          <button id="insertBtn" class="secondary" type="button" data-i18n="insertAfterButton">Insert after</button>
          <button id="copyBtn" class="secondary" type="button" data-i18n="copyButton">Copy</button>
        </div>

        <div id="errorText" class="error"></div>
      </div>
    </div>

    <script src="panel.js"></script>
  </body>
</html>
